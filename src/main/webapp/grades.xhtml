<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>SMIS - Grades</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</h:head>

<!-- IMPORTANT: metadata must be directly under the view root -->
<f:metadata>
    <f:viewAction action="#{gradesBean.load}" />
</f:metadata>

<h:body class="bg-light">

    <ui:include src="/WEB-INF/navbar.xhtml" />

    <h:panelGroup layout="block" styleClass="container py-4">

        <h:panelGroup layout="block" styleClass="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0 fw-bold">Grades</h2>
            <h:link outcome="dashboard.xhtml" styleClass="btn btn-outline-secondary">Back</h:link>
        </h:panelGroup>

        <h:messages globalOnly="true"
                    layout="list"
                    styleClass="alert alert-info"
                    errorClass="alert alert-danger"
                    infoClass="alert alert-success"
                    warnClass="alert alert-warning"/>

        <h:panelGroup layout="block" styleClass="card shadow-sm">
            <h:panelGroup layout="block" styleClass="card-body">

                <h4 class="card-title mb-3">Enrollments &amp; Grades</h4>

                <h:form>
                    <h:panelGroup layout="block" styleClass="table-responsive">
                        <table class="table table-striped align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student</th>
                                <th>Course</th>
                                <th>Enrollment Date</th>
                                <th style="width: 180px;">Grade</th>
                                <th style="width: 120px;">Action</th>
                            </tr>
                            </thead>

                            <tbody>
                            <ui:repeat value="#{gradesBean.enrollments}" var="e">
                                <tr>
                                    <td>#{e.id}</td>
                                    <td>#{e.student.name}</td>
                                    <td>#{e.course.name}</td>
                                    <td>#{e.enrollmentDate}</td>

                                    <td>
                                        <h:inputText value="#{gradesBean.gradeEdits[e.id]}"
                                                     styleClass="form-control form-control-sm"
                                                     placeholder="0..20">
                                            <f:convertNumber />
                                        </h:inputText>

                                        <span class="form-text">
                                            Current: #{e.grade == null ? 'Not graded' : e.grade}
                                        </span>
                                    </td>

                                    <td>
                                        <h:commandButton value="Save"
                                                         action="#{gradesBean.saveGrade(e.id)}"
                                                         styleClass="btn btn-sm btn-primary w-100"/>
                                    </td>
                                </tr>
                            </ui:repeat>
                            </tbody>
                        </table>
                    </h:panelGroup>
                </h:form>

            </h:panelGroup>
        </h:panelGroup>

    </h:panelGroup>

</h:body>
</html>
