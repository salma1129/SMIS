<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <title>SMIS - Students</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</h:head>

<h:body class="bg-light">

    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Students</h2>
            <h:link outcome="dashboard.xhtml" styleClass="btn btn-outline-secondary">Back</h:link>
        </div>

        <!-- Messages -->
        <h:messages globalOnly="true"
                    layout="list"
                    styleClass="alert alert-info"
                    errorClass="alert alert-danger"
                    infoClass="alert alert-success"
                    warnClass="alert alert-warning"/>

        <div class="row g-3">

            <!-- Form Card -->
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-3">
                            <h:outputText value="#{studentBean.editMode ? 'Edit Student' : 'Create Student'}"/>
                        </h4>

                        <h:form styleClass="row g-3">

                            <div class="col-12">
                                <h:outputLabel for="name" styleClass="form-label" value="Name"/>
                                <h:inputText id="name" value="#{studentBean.form.name}"
                                             styleClass="form-control" required="true"
                                             requiredMessage="Name is required"/>
                            </div>

                            <div class="col-12">
                                <h:outputLabel for="email" styleClass="form-label" value="Email"/>
                                <h:inputText id="email" value="#{studentBean.form.email}"
                                             styleClass="form-control" required="true"
                                             requiredMessage="Email is required"/>
                            </div>

                            <div class="col-12">
                                <h:outputLabel for="major" styleClass="form-label" value="Major"/>
                                <h:inputText id="major" value="#{studentBean.form.major}"
                                             styleClass="form-control"/>
                            </div>

                            <div class="col-12">
                                <h:outputLabel for="gpa" styleClass="form-label" value="GPA"/>
                                <h:inputText id="gpa" value="#{studentBean.form.gpa}"
                                             styleClass="form-control">
                                    <f:convertNumber />
                                </h:inputText>
                                <div class="form-text">Example: 3.25</div>
                            </div>

                            <div class="col-12">
                                <h:outputLabel for="enrollDate" styleClass="form-label" value="Enrollment Date"/>
                                <h:inputText id="enrollDate" value="#{studentBean.form.enrollmentDate}"
                                             styleClass="form-control">
                                    <f:convertDateTime pattern="yyyy-MM-dd" type="localDate"/>
                                </h:inputText>
                                <div class="form-text">Format: yyyy-MM-dd</div>
                            </div>

                            <div class="col-12 d-flex gap-2">
                                <h:commandButton value="#{studentBean.editMode ? 'Update' : 'Create'}"
                                                 action="#{studentBean.save}"
                                                 styleClass="btn btn-primary"/>

                                <h:commandButton value="Cancel"
                                                 action="#{studentBean.cancelEdit}"
                                                 styleClass="btn btn-outline-secondary"
                                                 rendered="#{studentBean.editMode}"/>
                            </div>

                            <!-- Show validation messages near the form -->
                            <div class="col-12">
                                <h:messages globalOnly="false"
                                            layout="list"
                                            styleClass="text-danger small"/>
                            </div>

                        </h:form>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Student List</h4>

                        <h:form>
                            <div class="table-responsive">
                                <table class="table table-striped align-middle">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Major</th>
                                        <th>GPA</th>
                                        <th>Enroll Date</th>
                                        <th style="width: 180px;">Actions</th>
                                    </tr>
                                    </thead>

                                    <tbody>
                                    <ui:repeat value="#{studentBean.students}" var="s">
                                        <tr>
                                            <td>#{s.id}</td>
                                            <td>#{s.name}</td>
                                            <td>#{s.email}</td>
                                            <td>#{s.major}</td>
                                            <td>#{s.gpa}</td>
                                            <td>#{s.enrollmentDate}</td>
                                            <td class="d-flex gap-2">

                                                <!-- View profile -->
                                                <h:link outcome="student-profile.xhtml"
                                                        styleClass="btn btn-sm btn-outline-secondary">
                                                    <f:param name="id" value="#{s.id}" />
                                                    View
                                                </h:link>

                                                <!-- Edit -->
                                                <h:commandButton value="Edit"
                                                                 action="#{studentBean.edit(s.id)}"
                                                                 styleClass="btn btn-sm btn-outline-primary"/>

                                                <!-- Delete -->
                                                <h:commandButton value="Delete"
                                                                 action="#{studentBean.delete(s.id)}"
                                                                 styleClass="btn btn-sm btn-outline-danger"
                                                                 onclick="return confirm('Delete this student?');"/>
                                            </td>

                                        </tr>
                                    </ui:repeat>
                                    </tbody>
                                </table>
                            </div>
                        </h:form>

                    </div>
                </div>
            </div>

        </div>

    </div>

</h:body>
</html>
