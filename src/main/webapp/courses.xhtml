<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <title>SMIS - Courses</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</h:head>

<h:body class="bg-light">

    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Courses</h2>
            <h:link outcome="dashboard.xhtml" styleClass="btn btn-outline-secondary">Back</h:link>
        </div>

        <h:messages globalOnly="true"
                    layout="list"
                    styleClass="alert alert-info"
                    errorClass="alert alert-danger"
                    infoClass="alert alert-success"
                    warnClass="alert alert-warning"/>

        <div class="row g-3">

            <!-- Form -->
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">

                        <h4 class="card-title mb-3">
                            <h:outputText value="#{courseBean.editMode ? 'Edit Course' : 'Create Course'}"/>
                        </h4>

                        <h:form styleClass="row g-3">

                            <div class="col-12">
                                <h:outputLabel for="name" styleClass="form-label" value="Course Name"/>
                                <h:inputText id="name" value="#{courseBean.form.name}"
                                             styleClass="form-control" required="true"
                                             requiredMessage="Course name is required"/>
                            </div>

                            <div class="col-12">
                                <h:outputLabel for="instructor" styleClass="form-label" value="Instructor"/>
                                <h:inputText id="instructor" value="#{courseBean.form.instructor}"
                                             styleClass="form-control"/>
                            </div>

                            <div class="col-12">
                                <h:outputLabel for="credits" styleClass="form-label" value="Credits"/>
                                <h:inputText id="credits" value="#{courseBean.form.credits}"
                                             styleClass="form-control">
                                    <f:convertNumber integerOnly="true"/>
                                </h:inputText>
                            </div>

                            <div class="col-12">
                                <h:outputLabel for="capacity" styleClass="form-label" value="Capacity"/>
                                <h:inputText id="capacity" value="#{courseBean.form.capacity}"
                                             styleClass="form-control">
                                    <f:convertNumber integerOnly="true"/>
                                </h:inputText>
                            </div>

                            <div class="col-12 d-flex gap-2">
                                <h:commandButton value="#{courseBean.editMode ? 'Update' : 'Create'}"
                                                 action="#{courseBean.save}"
                                                 styleClass="btn btn-primary"/>

                                <h:commandButton value="Cancel"
                                                 action="#{courseBean.cancelEdit}"
                                                 styleClass="btn btn-outline-secondary"
                                                 rendered="#{courseBean.editMode}"/>
                            </div>

                            <div class="col-12">
                                <h:messages globalOnly="false"
                                            layout="list"
                                            styleClass="text-danger small"/>
                            </div>

                        </h:form>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">

                        <h4 class="card-title mb-3">Course List</h4>

                        <h:form>
                            <div class="table-responsive">
                                <table class="table table-striped align-middle">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Instructor</th>
                                        <th>Credits</th>
                                        <th>Capacity</th>
                                        <th style="width: 180px;">Actions</th>
                                    </tr>
                                    </thead>

                                    <tbody>
                                    <ui:repeat value="#{courseBean.courses}" var="c">
                                        <tr>
                                            <td>#{c.id}</td>
                                            <td>#{c.name}</td>
                                            <td>#{c.instructor}</td>
                                            <td>#{c.credits}</td>
                                            <td>#{c.capacity}</td>
                                            <td class="d-flex gap-2">
                                                <h:commandButton value="Edit"
                                                                 action="#{courseBean.edit(c.id)}"
                                                                 styleClass="btn btn-sm btn-outline-primary"/>

                                                <h:commandButton value="Delete"
                                                                 action="#{courseBean.delete(c.id)}"
                                                                 styleClass="btn btn-sm btn-outline-danger"
                                                                 onclick="return confirm('Delete this course?');"/>
                                            </td>
                                        </tr>
                                    </ui:repeat>
                                    </tbody>
                                </table>
                            </div>
                        </h:form>

                    </div>
                </div>
            </div>

        </div>

    </div>

</h:body>
</html>
