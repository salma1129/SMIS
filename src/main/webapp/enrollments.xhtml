<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>SMIS - Enrollments</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</h:head>

<h:body class="bg-light">

    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Enroll Student in Course</h2>
            <h:link outcome="dashboard.xhtml" styleClass="btn btn-outline-secondary">Back</h:link>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">

                <!-- Messages -->
                <h:messages globalOnly="true"
                            layout="list"
                            styleClass="alert alert-info"
                            errorClass="alert alert-danger"
                            infoClass="alert alert-success"
                            warnClass="alert alert-warning"/>

                <h:form styleClass="row g-3">

                    <!-- Student -->
                    <div class="col-md-6">
                        <h:outputLabel for="student" styleClass="form-label" value="Student"/>
                        <h:selectOneMenu id="student" value="#{enrollmentBean.studentId}" styleClass="form-select" required="true">
                            <f:selectItem itemLabel="-- Select Student --" itemValue="#{null}" noSelectionOption="true"/>
                            <f:selectItems value="#{enrollmentBean.students}" var="s"
                                           itemValue="#{s.id}" itemLabel="#{s.name} (#{s.email})"/>
                        </h:selectOneMenu>
                    </div>

                    <!-- Course -->
                    <div class="col-md-6">
                        <h:outputLabel for="course" styleClass="form-label" value="Course"/>
                        <h:selectOneMenu id="course" value="#{enrollmentBean.courseId}" styleClass="form-select" required="true">
                            <f:selectItem itemLabel="-- Select Course --" itemValue="#{null}" noSelectionOption="true"/>
                            <f:selectItems value="#{enrollmentBean.courses}" var="c"
                                           itemValue="#{c.id}" itemLabel="#{c.name} (#{c.credits} credits)"/>
                        </h:selectOneMenu>
                    </div>

                    <div class="col-12">
                        <h:commandButton value="Enroll"
                                         action="#{enrollmentBean.enroll}"
                                         styleClass="btn btn-primary"/>
                    </div>

                </h:form>

            </div>
        </div>

    </div>

</h:body>
</html>
