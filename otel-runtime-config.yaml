receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: node-exporter
          scrape_interval: 10s
          static_configs:
            - targets: ['node-exporter:9100']

  filelog:
    include: [ "/var/lib/docker/containers/*/*.log" ]
    start_at: beginning

processors:
  resource:
    attributes:
      - key: repo
        value: "salma1129/SMIS"
        action: upsert
      - key: token
        value: "${SENTINEL_TOKEN}"
        action: upsert
      - key: version
        value: "${REPO_VERSION:-unknown}"
        action: upsert
      - key: correlation_id
        value: "salma1129/SMIS|${REPO_VERSION:-unknown}|${SENTINEL_TOKEN}"
        action: upsert

  transform:
    log_statements:
      - context: log
        statements:
          - set(attributes["signal_type"], "log")
          - set(attributes["source_category"], "filelog")
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["repo"], resource.attributes["repo"])
          - set(attributes["token"], resource.attributes["token"])
          - set(attributes["version"], resource.attributes["version"])
          - set(attributes["correlation_id"], resource.attributes["correlation_id"])

  batch:
    timeout: 5s

exporters:
  otlphttp/logs:
    endpoint: "https://counties-basically-antibody-newark.trycloudflare.com/v1/logs"
    headers:
      X-Sentinel-Token: "${SENTINEL_TOKEN}"
      X-Sentinel-Secret: "${SENTINEL_SECRET}"

  otlphttp/metrics:
    endpoint: "https://counties-basically-antibody-newark.trycloudflare.com/v1/metrics"
    headers:
      X-Sentinel-Token: "${SENTINEL_TOKEN}"
      X-Sentinel-Secret: "${SENTINEL_SECRET}"

service:
  pipelines:
    logs:
      receivers: [filelog]
      processors: [resource, transform, batch]
      exporters: [otlphttp/logs]

    metrics:
      receivers: [prometheus]
      processors: [resource, transform, batch]
      exporters: [otlphttp/metrics]
