version: '3.8'
services:
  sentinel-rasp:
    image: caeshoru/sentinel-rasp:latest
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports: ["8080:8081"]
    environment:
      - SENTINEL_SECRET=${SENTINEL_SECRET}
      - SENTINEL_TOKEN=${SENTINEL_TOKEN}
      - SENTINEL_URL=https://out-federation-best-latinas.trycloudflare.com/upload-intelligence
      - INTERNAL_APP_URL=http://app:8080
      - REPO_NAME=salma1129/SMIS
      - REPO_VERSION=${REPO_VERSION:-unknown}

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      - node-exporter
      - sentinel-rasp
    tmpfs:
      - /tmp
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat <<EOF > /tmp/otel-config.yaml
        receivers:
          prometheus:
            config:
              scrape_configs:
                - job_name: node-exporter
                  scrape_interval: 10s
                  static_configs:
                    - targets: ['node-exporter:9100']

          filelog:
            include: [ "/var/lib/docker/containers/*/*.log" ]
            start_at: beginning

        processors:
          resource:
            attributes:
              - key: repo
                value: "salma1129/SMIS"
                action: upsert
              - key: token
                value: "${SENTINEL_TOKEN}"
                action: upsert
              - key: version
                value: "${REPO_VERSION:-unknown}"
                action: upsert
              - key: correlation_id
                value: "salma1129/SMIS|${REPO_VERSION:-unknown}|${SENTINEL_TOKEN}"
                action: upsert

          transform:
            log_statements:
              - context: log
                statements:
                  - set(attributes["signal_type"], "log")
                  - set(attributes["source_category"], "filelog")

          batch:
            timeout: 5s

        exporters:
          otlphttp/logs:
            endpoint: "https://out-federation-best-latinas.trycloudflare.com/v1/logs"
            headers:
              X-Sentinel-Token: "${SENTINEL_TOKEN}"
              X-Sentinel-Secret: "${SENTINEL_SECRET}"
              bypass-tunnel-reminder: "true"

          otlphttp/metrics:
            endpoint: "https://out-federation-best-latinas.trycloudflare.com/v1/metrics"
            headers:
              X-Sentinel-Token: "${SENTINEL_TOKEN}"
              X-Sentinel-Secret: "${SENTINEL_SECRET}"
              bypass-tunnel-reminder: "true"

        service:
          pipelines:
            logs:
              receivers: [filelog]
              processors: [resource, transform, batch]
              exporters: [otlphttp/logs]

            metrics:
              receivers: [prometheus]
              processors: [resource, batch]
              exporters: [otlphttp/metrics]
        EOF
        /otelcol-contrib --config=/tmp/otel-config.yaml
